site_name: TurboLynx
site_description: Analytical graph database for schemaless property graphs
site_url: https://turbolynx.io/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo-red.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - announce.dismiss

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/timeline.js
  - javascripts/mobile-drawer.js

nav:
  - Installation: installation/overview.md
  - Documentation:
      - Overview: documentation/README.md
      - Getting Started:
          - Overview: documentation/getting-started/overview.md
          - Quickstart: documentation/getting-started/quickstart.md
      - Data Import:
          - File Formats: documentation/data-import/formats.md
      - Cypher:
          - Query Overview: documentation/cypher/overview.md
      - Client APIs:
          - Overview: documentation/client-apis/overview.md
          - CLI:
              - Overview: documentation/client-apis/cli/overview.md
              - Dot Commands: documentation/client-apis/cli/dot-commands.md
              - Output Formats: documentation/client-apis/cli/output-formats.md
          - C API: documentation/client-apis/c-api/overview.md
      - Internals:
          - Storage Engine: documentation/internals/storage.md
          - Query Optimizer: documentation/internals/optimizer.md
      - Development:
          - Building TurboLynx:
              - Overview: documentation/development/building-turbolynx/overview.md
              - Linux: documentation/development/building-turbolynx/linux.md
              - Build Configuration: documentation/development/building-turbolynx/build-configuration.md
          - Testing: documentation/development/testing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/turbolynx-dslab/TurboLynx
