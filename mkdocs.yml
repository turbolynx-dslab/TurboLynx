site_name: TurboLynx
site_description: Analytical graph database for schemaless property graphs
site_url: https://your-org.github.io/turbograph-v3/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Documentation:
      - Getting Started:
          - Overview: documentation/getting-started/overview.md
          - Quickstart: documentation/getting-started/quickstart.md
      - Data Import:
          - File Formats: documentation/data-import/formats.md
      - Cypher:
          - Query Overview: documentation/cypher/overview.md
      - Internals:
          - Storage Engine: documentation/internals/storage.md
          - Query Optimizer: documentation/internals/optimizer.md
      - Development:
          - Building TurboLynx: documentation/development/building-turbograph/overview.md
          - Testing: documentation/development/testing.md
  - Installation: installation/overview.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/turbograph-v3
