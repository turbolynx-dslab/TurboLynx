<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Road to TurboLynx</title>
<style>
  :root{
    --bg:       #fafafa;
    --bg-soft:  #f3f4f6;
    --ink:      #0f1114;
    --ink-dim:  #5a6370;
    --ink-mute: #8a909a;
    --red:      #c8102e;
    --red-soft: rgba(200, 16, 46, 0.08);
    --red-bd:   rgba(200, 16, 46, 0.35);
    --line:     rgba(15, 17, 20, 0.12);
    --card:     #ffffff;
    --card-bd:  rgba(15, 17, 20, 0.10);
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  html,body{overscroll-behavior:none}

  /* Subtle background wash */
  body{
    background:
      radial-gradient(900px 420px at 20% 20%, rgba(200,16,46,.04), transparent 60%),
      radial-gradient(700px 380px at 85% 80%, rgba(15,17,20,.03), transparent 60%),
      var(--bg);
  }

  /* ——— Top label ——— */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 24px;pointer-events:none;
  }
  .brand{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-mute);font-weight:600;pointer-events:auto;
  }
  .brand b{color:var(--ink)}
  .hint{
    font-size:11px;color:var(--ink-mute);letter-spacing:.05em;pointer-events:auto;
    display:flex;align-items:center;gap:8px;
  }
  .hint .dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 10px rgba(200,16,46,.45)}
  @media (max-width:640px){ .hint .label{display:none} }

  /* ——— Horizontal scroll stage ——— */
  .stage{
    position:fixed;inset:0;
    overflow-x:auto;overflow-y:hidden;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x proximity;
  }
  .stage::-webkit-scrollbar{display:none}
  .stage{scrollbar-width:none;-ms-overflow-style:none}

  .track{
    position:relative;height:100%;
    /* Big leading padding so the hero sits centered on load */
    padding-left:calc(50vw - 320px);
    padding-right:8vw;
    display:flex;align-items:center;
  }
  @media (max-width:640px){
    .track{ padding-left:calc(50vw - 43vw); }
  }

  /* Base rail line */
  .rail{
    position:absolute;left:0;right:0;top:50%;
    height:1px;background:linear-gradient(90deg,
      rgba(15,17,20,0) 0%,
      rgba(15,17,20,.14) 6%,
      rgba(15,17,20,.14) 94%,
      rgba(15,17,20,0) 100%);
    transform:translateY(-.5px);
  }

  /* ——— Hero card (TurboLynx) ——— */
  .hero{
    position:relative;flex:0 0 auto;
    width:min(78vw, 560px);
    margin-right:7vw;
    scroll-snap-align:center;
  }
  .hero-inner{
    position:relative;padding:30px 32px;
    border-radius:22px;
    background:linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
    border:1px solid var(--red-bd);
    box-shadow:
      0 20px 50px rgba(15,17,20,.08),
      0 2px 8px rgba(15,17,20,.04);
  }
  .kicker{
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--red);font-weight:700;
    display:inline-flex;align-items:center;gap:10px;
  }
  .kicker::before{content:"";width:22px;height:1px;background:var(--red);display:inline-block}
  .hero h1{
    margin:12px 0 8px;
    font-size:clamp(24px, 3.6vw, 38px);
    line-height:1.1;letter-spacing:-.02em;font-weight:700;color:var(--ink);
  }
  .hero .sub{
    font-size:clamp(13px,1.2vw,15px);color:var(--ink-dim);
    margin:0 0 18px;line-height:1.55;
  }
  .hero .year{
    display:inline-block;padding:5px 11px;border-radius:999px;
    background:var(--red-soft);border:1px solid var(--red-bd);
    color:var(--red);font-size:11px;letter-spacing:.08em;font-weight:700;
  }
  .hero .cta{
    margin-top:22px;display:inline-flex;gap:8px;align-items:center;
    font-size:12px;color:var(--ink);cursor:pointer;font-weight:600;
    padding:10px 16px;border-radius:999px;
    background:var(--bg-soft);border:1px solid var(--card-bd);
    transition:transform .2s ease, background .2s ease, border-color .2s ease;
  }
  .hero .cta:hover{background:#ffffff;border-color:var(--red-bd);transform:translateY(-1px)}
  .hero .cta .arrow{transition:transform .25s ease}
  .hero .cta:hover .arrow{transform:translateX(3px)}

  /* ——— Paper nodes ——— */
  .node{
    position:relative;flex:0 0 auto;
    width:240px;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    scroll-snap-align:center;
  }
  .node .label-top, .node .label-bot{
    position:absolute;left:50%;transform:translateX(-50%);
    width:220px;text-align:center;color:var(--ink-dim);pointer-events:none;
  }
  .node .label-top{ bottom:calc(50% + 60px); }
  .node .label-bot{ top:calc(50% + 60px); }
  .node .title{
    display:block;color:var(--ink);font-weight:600;
    font-size:13px;line-height:1.35;margin-bottom:4px;letter-spacing:-.005em;
  }
  .node .venue{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute)}
  .node .year-label{
    font-family:"JetBrains Mono",ui-monospace,monospace;
    font-size:11px;color:var(--ink-mute);
  }

  .dot-btn{
    -webkit-appearance:none;appearance:none;border:0;padding:0;cursor:pointer;
    width:14px;height:14px;border-radius:50%;
    background:#ffffff;border:2px solid var(--ink-dim);
    box-shadow:0 2px 8px rgba(15,17,20,.08);
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    position:relative;
  }
  .dot-btn:hover{
    transform:scale(1.25);
    border-color:var(--red);
    box-shadow:0 4px 14px rgba(200,16,46,.25);
  }
  .node.key .dot-btn{
    width:18px;height:18px;
    background:var(--red);border-color:#ffffff;
    box-shadow:0 0 0 2px var(--red), 0 4px 14px rgba(200,16,46,.3);
  }
  .node.key .dot-btn:hover{ transform:scale(1.2); }
  .node.key .title{color:var(--ink)}

  /* alternating placement top/bottom */
  .node.up .label-top{display:block}
  .node.up .label-bot{display:none}
  .node.down .label-top{display:none}
  .node.down .label-bot{display:block}

  /* Connector tick from dot to label */
  .node .tick{
    position:absolute;left:50%;top:50%;
    width:1px;height:44px;
    background:linear-gradient(180deg, rgba(15,17,20,.3), rgba(15,17,20,0));
    transform-origin:top center;
  }
  .node.up .tick{transform:translate(-50%,-100%) rotate(180deg)}
  .node.down .tick{transform:translate(-50%,0)}

  /* End cap */
  .end{
    flex:0 0 auto;width:22vw;display:flex;align-items:center;justify-content:flex-start;
    color:var(--ink-mute);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding-left:16px;
  }
  .end .line{width:60px;height:1px;background:var(--line);margin-right:12px}

  /* ——— Scroll progress bar ——— */
  .progress-wrap{
    position:fixed;left:24px;right:24px;bottom:18px;z-index:15;
    display:flex;align-items:center;gap:12px;pointer-events:none;
  }
  .progress{ flex:1;height:2px;background:rgba(15,17,20,.08);border-radius:2px;overflow:hidden; }
  .progress > span{
    display:block;height:100%;width:0%;
    background:linear-gradient(90deg, var(--red), #ff6b7f);
    transition:width .15s ease;
  }
  .progress-label{
    font-family:"JetBrains Mono",ui-monospace,monospace;
    font-size:10px;color:var(--ink-mute);letter-spacing:.08em;min-width:80px;text-align:right;
  }

  /* ——— Modal ——— */
  .modal-bd{
    position:fixed;inset:0;z-index:50;
    background:rgba(15,17,20,.35);
    backdrop-filter:blur(10px) saturate(1.2);
    -webkit-backdrop-filter:blur(10px) saturate(1.2);
    display:flex;align-items:center;justify-content:center;padding:24px;
    opacity:0;pointer-events:none;transition:opacity .25s ease;
  }
  .modal-bd.open{opacity:1;pointer-events:auto}
  .modal{
    position:relative;max-width:560px;width:100%;
    background:#ffffff;
    border:1px solid var(--card-bd);
    border-radius:18px;padding:30px 30px 26px;
    box-shadow:0 30px 80px rgba(15,17,20,.2);
    transform:translateY(12px) scale(.98);
    transition:transform .3s cubic-bezier(.2,.8,.2,1);
  }
  .modal-bd.open .modal{transform:translateY(0) scale(1)}
  .modal .close{
    position:absolute;top:12px;right:12px;
    width:32px;height:32px;border-radius:50%;
    background:var(--bg-soft);border:1px solid var(--card-bd);
    color:var(--ink);font-size:16px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .modal .close:hover{background:#fff;border-color:var(--red-bd)}
  .modal .m-year{
    display:inline-block;font-family:"JetBrains Mono",ui-monospace,monospace;
    font-size:11px;color:var(--ink-dim);letter-spacing:.1em;
    padding:4px 10px;border-radius:999px;
    background:var(--bg-soft);border:1px solid var(--card-bd);
  }
  .modal.key .m-year{
    color:var(--red);
    background:var(--red-soft);border-color:var(--red-bd);
  }
  .modal h2{
    margin:12px 0 6px;
    font-size:22px;line-height:1.22;letter-spacing:-.01em;color:var(--ink);
  }
  .modal .m-venue{
    font-size:11px;color:var(--ink-mute);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;
  }
  .modal p{ color:var(--ink-dim);font-size:14px;line-height:1.65;margin:0; }
  .modal .m-tag{
    display:inline-block;margin-top:16px;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-mute);
  }

  /* Mobile tuning */
  @media (max-width:640px){
    .topbar{padding:12px 14px}
    .hero{width:82vw;margin-right:8vw}
    .hero-inner{padding:22px 22px;border-radius:18px}
    .node{width:200px}
    .node .label-top, .node .label-bot{width:190px}
    .node .title{font-size:12px}
    .progress-wrap{left:14px;right:14px;bottom:14px}
    .modal{padding:24px 20px 20px}
    .modal h2{font-size:19px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><b>POSTECH · DBLab</b> &nbsp;·&nbsp; The Road to TurboLynx</div>
  <div class="hint"><span class="dot"></span><span class="label">Scroll horizontally · click a dot</span></div>
</div>

<div class="stage" id="stage">
  <div class="track" id="track"></div>
</div>

<div class="progress-wrap">
  <div class="progress"><span id="bar"></span></div>
  <div class="progress-label" id="plabel">2026 → 2012</div>
</div>

<div class="modal-bd" id="modalBd">
  <div class="modal" id="modal">
    <button class="close" id="closeBtn" aria-label="Close">×</button>
    <span class="m-year" id="mYear"></span>
    <h2 id="mTitle"></h2>
    <div class="m-venue" id="mVenue"></div>
    <p id="mDesc"></p>
    <div class="m-tag" id="mTag"></div>
  </div>
</div>

<script>
const papers = [
  { hero:true, key:true, year:"2026", title:"TurboLynx",
    subtitle:"Schemaless graph engine for general-purpose analytics",
    venue:"VLDB 2026 · POSTECH DBLab",
    desc:"TurboLynx is a schemaless graph engine that unifies more than a decade of graph research from the POSTECH Data Systems Lab into a single general-purpose analytics system. Building on the Turbo lineage — from TurboGraph and TurboISO, through TurboFlux, DAF, G-CARE, VEQ, and iTurboGraph — it brings subgraph matching, cardinality estimation, continuous query processing, and scalable graph storage together without the overhead of rigid schemas.",
    tag:"The present — and what's next." },
  { year:"2024", title:"In-depth Analysis of Continuous Subgraph Matching", venue:"SIGMOD 2024",
    desc:"Unifies prior continuous subgraph matching systems under a common delta-query compilation framework, revealing which design choices actually matter for streaming graph workloads. Lee, Kim, Lee, Han.",
    tag:"Streaming · Compilation" },
  { year:"2024", title:"Time-Constrained Continuous Subgraph Matching", venue:"ICDE 2024",
    desc:"Exploits temporal information for filtering and backtracking in continuous subgraph matching over time-windowed streaming graphs. Min, Jang, Park, Giammarresi, Italiano, Han.",
    tag:"Streaming · Temporal" },
  { year:"2022", title:"Graph Isomorphism via Degree Sequences & Color-Label Distributions", venue:"ICDE 2022",
    desc:"Efficient graph isomorphism query processing by combining degree-sequence signatures with color-label distribution filters. Gu, Nam, Park, Galil, Italiano, Han.",
    tag:"Graph isomorphism" },
  { year:"2021", key:true, title:"iTurboGraph: Scaling & Automating Incremental Graph Analytics", venue:"SIGMOD 2021",
    desc:"Extends the Turbo graph engine family to incremental analytics, automatically deriving efficient incremental computation for graph queries on evolving graphs. Ko, Lee, Hong, Lee, Seo, Seo, Han.",
    tag:"Incremental analytics" },
  { year:"2021", key:true, title:"VEQ: Versatile Equivalences for Subgraph Matching", venue:"SIGMOD 2021",
    desc:"Introduces neighbor-equivalence classes and dynamic equivalence to prune the subgraph-matching search space, delivering orders-of-magnitude speedups across diverse workloads. Kim, Choi, Park, Lin, Hong, Han.",
    tag:"Subgraph matching" },
  { year:"2021", title:"Worst-Case Optimal Graph Pattern Cardinality Estimation", venue:"SIGMOD 2021",
    desc:"Combines sampling with synopses to give the first graph pattern cardinality estimator with both worst-case-optimal runtime and quality guarantees. Kim, Kim, Fletcher, Han.",
    tag:"Cardinality estimation" },
  { year:"2021", title:"Scalable Graph Isomorphism via Compressed Candidate Space", venue:"ICDE 2021",
    desc:"Combines pairwise color refinement with backtracking over a compressed candidate space to scale exact graph isomorphism. Gu, Nam, Park, Galil, Italiano, Han.",
    tag:"Graph isomorphism" },
  { year:"2020", key:true, title:"G-CARE: Cardinality Estimation for Subgraph Matching", venue:"SIGMOD 2020",
    desc:"The first systematic benchmark and framework for subgraph-matching cardinality estimation. G-CARE reshaped how the community thinks about graph query optimization and remains the reference point for new estimators. Park, Ko, Bhowmick, Kim, Hong, Han.",
    tag:"Benchmark · Optimizer" },
  { year:"2019", key:true, title:"DAF: Efficient Subgraph Matching via Failing Sets", venue:"SIGMOD 2019",
    desc:"Harmonizes dynamic programming, adaptive matching order, and failing-set–based pruning. For years it defined the state of the art in exact subgraph matching and inspired a whole family of follow-up systems. Han, Kim, Gu, Park, Han.",
    tag:"Subgraph matching" },
  { year:"2018", key:true, title:"TurboFlux: Fast Continuous Subgraph Matching", venue:"SIGMOD 2018",
    desc:"Introduced the data-centric graph (DCG) representation, enabling continuous subgraph matching at streaming speeds. The foundation of every subsequent streaming graph-matching engine in the Turbo lineage. Kim, Seo, Han, Lee, Hong, Chafi, Shin, Jeong.",
    tag:"Streaming" },
  { year:"2018", key:true, title:"TurboGraph++: Scalable & Fast Graph Analytics", venue:"SIGMOD 2018",
    desc:"Extends TurboGraph with a new block-based execution model tailored to modern multi-core, large-memory machines, delivering the scalability needed for industrial-size graph analytics. Ko, Han.",
    tag:"Analytics engine" },
  { year:"2016", title:"DualSim: Parallel Subgraph Enumeration on a Single Machine", venue:"SIGMOD 2016",
    desc:"Shows that, with careful pruning, a single machine can enumerate subgraphs on graphs that previously required full clusters — challenging the 'bigger is better' consensus of the era. Kim, Lee, Bhowmick, Han, Lee, Ko, Jarrah.",
    tag:"Single-machine" },
  { year:"2014", title:"OPT: Overlapped & Parallel Triangulation in Large Graphs", venue:"SIGMOD 2014",
    desc:"A framework for overlapped and parallel triangle enumeration in large-scale graphs, setting a baseline for high-throughput motif counting. Kim, Han, Lee, Park, Yu.",
    tag:"Triangles · Motifs" },
  { year:"2013", key:true, title:"TurboISO: Ultrafast & Robust Subgraph Isomorphism", venue:"SIGMOD 2013",
    desc:"Introduced neighborhood equivalence classes and candidate-region exploration, delivering robust, ultra-fast subgraph isomorphism. The paper that launched the 'Turbo' lineage of subgraph-matching research. Han, Lee, Lee.",
    tag:"Subgraph isomorphism" },
  { year:"2013", key:true, title:"TurboGraph: A Fast Parallel Graph Engine", venue:"KDD 2013",
    desc:"Pioneered pin-and-slide I/O with column views, showing that a single commodity PC with SSDs can outperform large graph-processing clusters on billion-scale graphs. The foundational paper of the Turbo engine family. Han, Lee, Park, Lee, Kim, Kim, Yu.",
    tag:"Disk-based engine" },
  { year:"2012", title:"In-depth Comparison of Subgraph Isomorphism Algorithms", venue:"VLDB 2012",
    desc:"A landmark empirical study that re-examined decades of subgraph isomorphism algorithms under a common framework — and set the stage for the Turbo family of matchers that would follow a year later. Lee, Han, Kasperovics, Lee.",
    tag:"Subgraph isomorphism" },
];

const track = document.getElementById("track");
const stage = document.getElementById("stage");

function el(tag, cls, html){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}

papers.forEach((p,i)=>{
  if(p.hero){
    const h=el("div","hero");
    h.innerHTML = `
      <div class="hero-inner">
        <div class="kicker">POSTECH DBLab · 2026</div>
        <h1>${p.title}</h1>
        <p class="sub">${p.subtitle}</p>
        <span class="year">${p.year}</span>
        <div class="cta" data-idx="${i}">
          Read the story <span class="arrow">→</span>
        </div>
      </div>
    `;
    track.appendChild(h);
  } else {
    const n = el("div","node " + (i%2===0 ? "up":"down") + (p.key?" key":""));
    n.innerHTML = `
      <div class="label-top">
        <span class="title">${p.title}</span>
        <span class="venue">${p.venue}</span>
      </div>
      <div class="tick"></div>
      <button class="dot-btn" data-idx="${i}" aria-label="${p.title}"></button>
      <div class="label-bot">
        <span class="year-label">${p.year}</span><br/>
        <span class="title">${p.title}</span>
        <span class="venue">${p.venue}</span>
      </div>
    `;
    track.appendChild(n);
  }
});

const end = el("div","end",'<span class="line"></span> The beginning');
track.appendChild(end);

const rail = el("div","rail");
track.insertBefore(rail, track.firstChild);

/* Modal */
const modalBd = document.getElementById("modalBd");
const modal   = document.getElementById("modal");
const mYear   = document.getElementById("mYear");
const mTitle  = document.getElementById("mTitle");
const mVenue  = document.getElementById("mVenue");
const mDesc   = document.getElementById("mDesc");
const mTag    = document.getElementById("mTag");

function openPaper(i){
  const p = papers[i];
  if(!p) return;
  modal.classList.toggle("key", !!p.key);
  mYear.textContent  = p.year;
  mTitle.textContent = p.hero ? p.title + " — " + p.subtitle : p.title;
  mVenue.textContent = p.venue;
  mDesc.textContent  = p.desc;
  mTag.textContent   = p.tag || "";
  modalBd.classList.add("open");
}
function closePaper(){ modalBd.classList.remove("open"); }

document.addEventListener("click",(e)=>{
  const b=e.target.closest("[data-idx]");
  if(b){ openPaper(+b.dataset.idx); }
});
document.getElementById("closeBtn").addEventListener("click",closePaper);
modalBd.addEventListener("click",(e)=>{ if(e.target===modalBd) closePaper(); });
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closePaper(); });

/* Vertical wheel → horizontal scroll */
stage.addEventListener("wheel",(e)=>{
  if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
    stage.scrollLeft += e.deltaY;
    e.preventDefault();
  }
},{passive:false});

stage.addEventListener("scroll",()=>{
  const max = stage.scrollWidth - stage.clientWidth;
  const pct = max>0 ? (stage.scrollLeft/max) : 0;
  document.getElementById("bar").style.width = (pct*100).toFixed(1)+"%";
});

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight"){ stage.scrollBy({left:window.innerWidth*0.6, behavior:"smooth"}); }
  if(e.key==="ArrowLeft"){  stage.scrollBy({left:-window.innerWidth*0.6, behavior:"smooth"}); }
});
</script>
</body>
</html>
