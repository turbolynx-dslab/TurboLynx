name: Build and Test

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same PR when a new commit is pushed.
# `push to main` runs are not cancelled — keep the full history of main builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential \
            autoconf automake libtool pkg-config \
            libnuma-dev

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja autoconf automake libtool pkg-config

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11 wheel pytest

      - name: Cache third_party builds
        uses: actions/cache@v4
        with:
          path: |
            build-portable/_deps
            build-portable/oneTBB-src
            build-portable/gp-xerces-src
            build-portable/gp-xerces-build
            build-portable/gp-xerces-install
            build-portable/hwloc-src
            build-portable/hwloc-build
            build-portable/hwloc-install
          key: ${{ matrix.os }}-thirdparty-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'third_party/**/CMakeLists.txt') }}
          restore-keys: |
            ${{ matrix.os }}-thirdparty-

      - name: Configure CMake
        run: |
          # TBB_STRICT=OFF: the pinned oneTBB version we fetch builds with
          # -Werror -Wfatal-errors. GCC 12+ raises a false-positive
          # stringop-overflow on its concurrent_monitor_base atomic<bool>
          # store, failing the build. TBB_STRICT=OFF disables -Werror in
          # oneTBB's own targets (warnings still print). macOS uses
          # AppleClang which doesn't emit this warning.
          #
          # TURBOLYNX_{LDBC,TPCH}_FIXTURE_MINI=ON: compile the [ldbc] /
          # [tpch] tests with the SF0.003 / SF0.01 mini fixture counts
          # instead of the SF1 defaults, since CI loads the committed
          # mini fixtures (test/data/{ldbc,tpch}-mini/). Local SF1
          # development omits these flags.
          cmake -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON=ON \
            -DTURBOLYNX_PORTABLE_DISK_IO=ON \
            -DENABLE_TCMALLOC=OFF \
            -DBUILD_UNITTESTS=ON \
            -DTBB_TEST=OFF \
            -DTBB_STRICT=OFF \
            -DTURBOLYNX_LDBC_FIXTURE_MINI=ON \
            -DTURBOLYNX_TPCH_FIXTURE_MINI=ON \
            -DPython3_EXECUTABLE="$(which python)" \
            -B build-portable

      - name: Build
        run: cmake --build build-portable

      - name: Run unit tests (ctest)
        working-directory: build-portable
        run: ctest --output-on-failure

      - name: Load TPC-H SF0.01 mini fixture
        run: bash scripts/load-tpch-mini.sh build-portable /tmp/tpch-mini-ws

      - name: Run TPC-H [tpch] query tests on mini fixture
        # `[broken-mini]`: 11 queries currently SIGSEGV inside the engine on
        # the SF0.01 fixture (issue #69 — tracked separately). Excluded so
        # one query's signal doesn't tear down the rest of the run.
        # `[stress]`: stress tests reference legacy hardcoded paths and need
        # a follow-up cleanup before they can run in CI.
        run: ./build-portable/test/query/query_test "[tpch]~[broken-mini]~[stress]" --tpch-path /tmp/tpch-mini-ws

      - name: Load LDBC SF0.003 mini fixture
        run: bash scripts/load-ldbc-mini.sh build-portable /tmp/ldbc-mini-ws

      - name: Run LDBC [count] tests on mini fixture
        # `[ldbc][count]` matches all 30 count cases (Catch2 selects tests
        # whose tag list contains every tag in the filter). The few cases
        # tagged `[!mayfail]` won't fail the suite if they regress; they
        # reflect known-flaky areas pre-migration. Other LDBC categories
        # (filter, traversal, IS/IC, robustness) need per-test count or
        # ID-rewrite migration and land in follow-up PRs.
        run: ./build-portable/test/query/query_test "[ldbc][count]" --ldbc-path /tmp/ldbc-mini-ws

      - name: Run LDBC [traversal] tests on mini fixture
        # `[ldbc][traversal]` exercises multi-hop / multi-partition /
        # bidirectional / varlen patterns against fixture-pinned
        # rankings (e.g. Top-N persons by Comment count) and SAMPLE_PERSON
        # relative counts. Expected values come from the helper header
        # and were Neo4j-verified on the SF0.003 fixture.
        run: ./build-portable/test/query/query_test "[ldbc][traversal]" --ldbc-path /tmp/ldbc-mini-ws

      - name: Run LDBC [robustness] tests on mini fixture
        # `[ldbc][robustness]~[stress]` exercises invalid/malformed
        # query handling against fixture-pinned anchors. `~[stress]`
        # excludes the four stress cases that depend on legacy SF1
        # paths. SIGSEGV-prone cases (issue #79) are gated SF1-only
        # via #ifndef TURBOLYNX_LDBC_FIXTURE_MINI; the SF1 binder
        # guard probe (#80) is similarly gated.
        run: ./build-portable/test/query/query_test "[ldbc][robustness]~[stress]" --ldbc-path /tmp/ldbc-mini-ws

      - name: Run LDBC [filter] tests on mini fixture
        # `[ldbc][filter]` exercises property filters, UNWIND, scalar
        # functions, map literals, ordered aggregation, paths, reduce,
        # XOR, and string predicates against fixture-pinned sample
        # Person/Forum/Tag/path constants (Neo4j-verified on SF0.003).
        run: ./build-portable/test/query/query_test "[ldbc][filter]" --ldbc-path /tmp/ldbc-mini-ws

      - name: Run LDBC [func] tests on mini fixture
        # `[ldbc][func]` exercises Cypher meta/string/math functions
        # (labels, type, keys, properties, random, setseed, string +,
        # =~ regex). Now that the `[filter]` cases have been
        # parameterized, the `~[filter]` exclusion is no longer
        # needed. The two `[!mayfail]` cases for labels()/keys(node)
        # track issue #73 (empty-string return on the mini fixture).
        run: ./build-portable/test/query/query_test "[ldbc][func]" --ldbc-path /tmp/ldbc-mini-ws

      - name: Build Python wheel
        run: bash tools/pythonpkg/scripts/build_wheel.sh build-portable

      - name: Install turbolynx wheel
        run: pip install tools/pythonpkg/dist/turbolynx-*.whl

      - name: Install oss-supply-chain app
        run: pip install -e applications/oss-supply-chain/app

      - name: Run oss-supply-chain pytest
        run: pytest applications/oss-supply-chain/tests -v
