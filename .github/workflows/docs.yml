name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'demo/app/**'
      - 'demo/agentic-demo/app/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements-docs.txt

      - name: Build MkDocs site
        run: mkdocs build

      - name: Build standalone Next.js demo
        working-directory: demo/app
        run: |
          npm install --no-audit --no-fund
          npx next build

      - name: Build agentic Next.js demo
        working-directory: demo/agentic-demo/app
        env:
          NEXT_EXPORT: '1'
          NEXT_PUBLIC_BASE_PATH: '/demo-agentic'
        run: |
          npm install --no-audit --no-fund
          npx next build

      - name: Merge demos into site
        run: |
          mkdir -p site/demo site/demo-agentic
          cp -r demo/app/out/. site/demo/
          cp -r demo/agentic-demo/app/out/. site/demo-agentic/
          touch site/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          cname: turbolynx.io
          force_orphan: true
